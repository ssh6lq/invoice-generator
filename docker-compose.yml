services:
  invoice:
    build: .
    image: hr-forms-gen
    container_name: hr-forms-gen
    ports:
      - "2200:8000"          # 호스트8000 → 컨테이너8000
    env_file:
      - .env                 # 환경변수(.env)에서 읽어옴 (없으면 기본값 동작)
    volumes:
      # SQLite 데이터 유지: 컨테이너를 지워도 문의/제출 내역이 남도록
      - ./data/feedback.db:/app/feedback.db
      - ./data/submissions.db:/app/submissions.db
    restart: unless-stopped
